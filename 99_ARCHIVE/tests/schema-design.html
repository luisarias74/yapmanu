<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>LaLanguish</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#000;display:flex;justify-content:center;align-items:center;min-height:100vh;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:white}
.app{position:relative;width:390px;height:844px;overflow:hidden;background:radial-gradient(ellipse 100% 45% at 0% 100%,rgba(0,210,215,.55) 0%,rgba(0,180,200,.2) 40%,transparent 100%),radial-gradient(ellipse 90% 40% at 5% 85%,rgba(30,100,210,.45) 0%,rgba(30,80,180,.15) 45%,transparent 100%),radial-gradient(ellipse 80% 35% at 10% 68%,rgba(90,45,170,.38) 0%,rgba(80,40,150,.12) 50%,transparent 100%),radial-gradient(ellipse 100% 45% at 100% 100%,rgba(180,35,165,.55) 0%,rgba(160,30,150,.2) 40%,transparent 100%),radial-gradient(ellipse 90% 38% at 95% 80%,rgba(120,28,155,.42) 0%,rgba(110,25,140,.14) 48%,transparent 100%),radial-gradient(ellipse 70% 35% at 50% 100%,rgba(40,130,170,.3) 0%,rgba(80,60,140,.15) 50%,transparent 100%),radial-gradient(ellipse 60% 30% at 35% 92%,rgba(50,90,180,.25) 0%,transparent 100%),radial-gradient(ellipse 60% 30% at 65% 92%,rgba(140,35,155,.25) 0%,transparent 100%),radial-gradient(ellipse at 50% 25%,rgba(30,20,80,.5) 0%,transparent 50%),linear-gradient(to bottom,#050510 0%,#070714 25%,#090920 50%,#0b0b28 75%,#0e0e30 100%)}
.star{position:absolute;border-radius:50%;background:white;pointer-events:none;z-index:0}
.star.tw{animation:twinkle 3s ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:inherit}50%{opacity:.1}}
.orb-glow{position:absolute;top:95px;left:50%;transform:translateX(-50%);width:290px;height:290px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.25) 0%,rgba(210,200,255,.1) 40%,transparent 70%);filter:blur(14px);z-index:1;animation:op 5s ease-in-out infinite}
@keyframes op{0%,100%{opacity:.85;transform:translateX(-50%) scale(1)}50%{opacity:1;transform:translateX(-50%) scale(1.05)}}
@keyframes breathe{0%,100%{transform:translateX(-50%) scale(1)}50%{transform:translateX(-50%) scale(1.035)}}
.orb{position:absolute;top:127px;left:50%;transform:translateX(-50%);width:155px;height:155px;border-radius:50%;cursor:pointer;z-index:3;transition:transform .3s;animation:breathe 5s ease-in-out infinite;background:radial-gradient(circle at 28% 22%,rgba(255,255,255,.9) 0%,rgba(255,255,255,.3) 30%,transparent 45%),radial-gradient(circle at 72% 25%,rgba(140,100,190,.5) 0%,rgba(160,120,200,.25) 35%,transparent 55%),radial-gradient(circle at 80% 40%,rgba(130,80,175,.35) 0%,transparent 45%),radial-gradient(circle at 45% 65%,rgba(160,215,235,.45) 0%,rgba(140,200,225,.2) 40%,transparent 60%),radial-gradient(circle at 50% 80%,rgba(170,210,230,.3) 0%,transparent 45%),radial-gradient(circle at 90% 55%,rgba(120,60,160,.25) 0%,transparent 40%),linear-gradient(155deg,rgba(225,220,240,.75) 0%,rgba(210,215,235,.7) 25%,rgba(195,210,230,.65) 45%,rgba(180,210,230,.6) 65%,rgba(200,195,225,.7) 100%);box-shadow:inset 0 0 20px 6px rgba(255,255,255,.4),inset 0 0 40px 12px rgba(255,255,255,.18),inset 0 0 55px 18px rgba(200,200,255,.08),0 0 40px 22px rgba(255,255,255,.28),0 0 80px 42px rgba(220,210,255,.16),0 0 140px 65px rgba(200,190,255,.09);backdrop-filter:blur(2px)}
.orb:active{transform:translateX(-50%) scale(1.08)}
.orb .hl{position:absolute;top:34px;left:46px;width:7px;height:7px;border-radius:50%;background:white;box-shadow:0 0 5px 2px rgba(255,255,255,.7)}
.h-beam{position:absolute;top:333px;left:0;width:100%;height:1.5px;z-index:4;pointer-events:none;background:linear-gradient(to right,transparent 0%,rgba(255,255,255,0) 18%,rgba(255,255,255,.1) 30%,rgba(255,255,255,.35) 42%,rgba(255,255,255,.7) 48%,rgba(255,255,255,.9) 50%,rgba(255,255,255,.7) 52%,rgba(255,255,255,.35) 58%,rgba(255,255,255,.1) 70%,rgba(255,255,255,0) 82%,transparent 100%)}
.h-glow{position:absolute;top:329px;left:20%;width:60%;height:10px;z-index:3;pointer-events:none;background:radial-gradient(ellipse at center,rgba(255,255,255,.18) 0%,transparent 75%);filter:blur(3px)}
.ig{position:absolute;top:333px;left:50%;transform:translate(-50%,-50%);width:90px;height:90px;border-radius:50%;z-index:5;pointer-events:none;background:radial-gradient(circle,rgba(255,255,255,.5) 0%,rgba(255,255,255,.2) 22%,transparent 68%)}
.ic{position:absolute;top:333px;left:50%;transform:translate(-50%,-50%);width:8px;height:8px;border-radius:50%;background:white;z-index:6;pointer-events:none;box-shadow:0 0 4px 2px rgba(255,255,255,.95),0 0 10px 4px rgba(255,255,255,.5)}
.v-beam{position:absolute;top:333px;left:50%;transform:translateX(-50%);width:1.5px;height:275px;z-index:2;background:linear-gradient(to bottom,rgba(255,255,255,.5) 0%,rgba(255,255,255,.15) 30%,transparent 100%)}
.v-ray-up{position:absolute;top:293px;left:50%;transform:translateX(-50%);width:1px;height:40px;z-index:2;pointer-events:none;background:linear-gradient(to top,rgba(255,255,255,.4) 0%,rgba(255,255,255,.08) 60%,transparent 100%)}
.content{position:absolute;top:355px;left:0;right:0;bottom:90px;z-index:8;overflow-y:auto;padding:10px 20px}
.content::-webkit-scrollbar{display:none}
.bottom-nav{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);display:flex;gap:10px;padding:10px 16px;border-radius:40px;background:rgba(12,12,35,.85);border:1px solid rgba(255,255,255,.18);backdrop-filter:blur(14px);z-index:10;box-shadow:inset 0 1px 0 0 rgba(255,255,255,.45),inset 0 2px 4px 0 rgba(255,255,255,.12),inset 0 0 8px 2px rgba(255,255,255,.08),inset 0 0 15px 4px rgba(255,255,255,.04)}
.nb{width:48px;height:48px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);box-shadow:inset 0 1px 0 0 rgba(255,255,255,.45),inset 0 2px 4px 0 rgba(255,255,255,.12),inset 0 0 8px 2px rgba(255,255,255,.08),inset 0 0 15px 4px rgba(255,255,255,.04)}
.nb svg{stroke:rgba(255,255,255,.45);fill:none}
.nb.on{background:rgba(0,210,215,.12);border-color:rgba(0,210,215,.3)}
.nb.on svg{stroke:rgba(0,210,215,.9)}
</style>
</head>
